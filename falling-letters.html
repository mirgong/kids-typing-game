<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母雨游戏 - 小键盘探险家</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 游戏专用样式 */
        .game-container {
            position: relative;
            width: 100%;
            height: 600px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
        }
        
        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        
        .game-stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .game-stat i {
            margin-right: 10px;
            color: #ffd700;
        }
        
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .game-over-modal.show {
            display: flex;
        }
        
        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }
        
        .game-over-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .game-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .game-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-restart {
            background: #2ecc71;
            color: white;
        }
        
        .btn-restart:hover {
            background: #27ae60;
            transform: scale(1.05);
        }
        
        .btn-home {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        
        .start-screen h2 {
            color: white;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .start-screen p {
            color: #ddd;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }
        
        .start-btn-large {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        
        .start-btn-large:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
        }
        
        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px;
            color: white;
        }
        
        .instructions h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .instructions ul {
            list-style: none;
            padding: 0;
        }
        
        .instructions li {
            margin: 10px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .instructions li:before {
            content: '✨';
            position: absolute;
            left: 0;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 连击显示 */
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 15;
        }
        
        .combo-display.show {
            animation: comboPop 0.5s ease forwards;
        }
        
        @keyframes comboPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-keyboard"></i>
                <h1>小键盘探险家</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> 首页</a>
                <a href="index.html#lessons" class="nav-link"><i class="fas fa-book"></i> 课程</a>
                <a href="index.html#games" class="nav-link active"><i class="fas fa-gamepad"></i> 游戏</a>
            </nav>
        </header>

        <main class="main-content">
            <h2 style="text-align: center; color: #333; margin-bottom: 10px;">
                <i class="fas fa-apple-alt" style="color: #ff6b6b;"></i> 字母雨游戏
            </h2>
            <p style="text-align: center; color: #666; margin-bottom: 20px;">
                接住掉落的字母，输入正确的键！
            </p>
            
            <div class="game-container">
                <canvas id="game-canvas"></canvas>
                
                <div class="game-ui">
                    <div class="game-stat">
                        <i class="fas fa-star"></i>
                        <span>得分：<span id="score">0</span></span>
                    </div>
                    <div class="game-stat">
                        <i class="fas fa-heart"></i>
                        <span>生命：<span id="lives">3</span></span>
                    </div>
                    <div class="game-stat">
                        <i class="fas fa-bolt"></i>
                        <span>连击：<span id="combo">0</span></span>
                    </div>
                </div>
                
                <div class="combo-display" id="combo-display"></div>
                
                <div class="start-screen" id="start-screen">
                    <h2>🍎 字母雨</h2>
                    <div class="instructions">
                        <h3>游戏说明</h3>
                        <ul>
                            <li>字母会从屏幕上方掉落</li>
                            <li>在字母落地前输入正确的字母</li>
                            <li>接住字母得分，漏掉扣生命</li>
                            <li>连续接住有连击奖励</li>
                            <li>生命归零游戏结束</li>
                        </ul>
                    </div>
                    <button class="start-btn-large" onclick="startGame()">
                        <i class="fas fa-play"></i> 开始游戏
                    </button>
                </div>
            </div>
            
            <div class="game-controls" style="text-align: center; margin-top: 20px;">
                <button class="game-btn btn-restart" onclick="restartGame()" style="display: none;" id="restart-btn">
                    <i class="fas fa-redo"></i> 重新开始
                </button>
                <button class="game-btn btn-home" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> 返回首页
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 小键盘探险家 - 字母雨游戏</p>
        </footer>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="game-over-modal">
        <div class="game-over-content">
            <h2>🎮 游戏结束</h2>
            <p>你的最终得分</p>
            <div class="final-score" id="final-score">0</div>
            <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                <div>
                    <div style="font-size: 2rem;" id="final-combo">0</div>
                    <div style="font-size: 0.9rem;">最高连击</div>
                </div>
                <div>
                    <div style="font-size: 2rem;" id="final-accuracy">0%</div>
                    <div style="font-size: 0.9rem;">准确率</div>
                </div>
            </div>
            <div class="game-buttons">
                <button class="game-btn btn-restart" onclick="restartGame()">
                    <i class="fas fa-redo"></i> 再来一次
                </button>
                <button class="game-btn btn-home" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> 返回首页
                </button>
            </div>
        </div>
    </div>

    <script>
        // 游戏变量
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let combo = 0;
        let maxCombo = 0;
        let correctCount = 0;
        let totalCount = 0;
        let letters = [];
        let spawnRate = 2000; // 生成间隔（毫秒）
        let lastSpawn = 0;
        let gameSpeed = 1; // 游戏速度
        let animationId;
        
        // 字母配置
        const letterColors = [
            '#ff6b6b', '#4ecdc4', '#ffd700', '#9b59b6', 
            '#2ecc71', '#e74c3c', '#3498db', '#f39c12'
        ];
        
        // 调整画布大小
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // 字母类
        class Letter {
            constructor() {
                this.char = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                this.x = Math.random() * (canvas.width - 50) + 25;
                this.y = -50;
                this.speed = (Math.random() * 1 + 1) * gameSpeed;
                this.radius = 30;
                this.color = letterColors[Math.floor(Math.random() * letterColors.length)];
                this.caught = false;
                this.missed = false;
            }
            
            update() {
                this.y += this.speed;
            }
            
            draw() {
                if (this.caught) return;
                
                // 绘制字母
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.closePath();
                
                // 绘制字母字符
                ctx.fillStyle = 'white';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char, this.x, this.y);
                
                // 绘制阴影效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
            }
            
            isCaught(inputChar) {
                return inputChar.toUpperCase() === this.char && !this.caught && !this.missed;
            }
            
            isMissed() {
                return this.y > canvas.height + 50 && !this.caught && !this.missed;
            }
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'inline-block';
            gameRunning = true;
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            correctCount = 0;
            totalCount = 0;
            letters = [];
            spawnRate = 2000;
            gameSpeed = 1;
            lastSpawn = Date.now();
            
            updateUI();
            gameLoop();
        }
        
        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 生成新字母
            const now = Date.now();
            if (now - lastSpawn > spawnRate) {
                letters.push(new Letter());
                lastSpawn = now;
                
                // 逐渐增加难度
                if (spawnRate > 800) spawnRate -= 20;
                gameSpeed += 0.01;
            }
            
            // 更新和绘制字母
            letters.forEach((letter, index) => {
                letter.update();
                letter.draw();
                
                // 检查是否漏掉
                if (letter.isMissed()) {
                    letter.missed = true;
                    lives--;
                    combo = 0;
                    updateUI();
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            });
            
            // 移除超出屏幕的字母
            letters = letters.filter(l => l.y < canvas.height + 100);
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 处理键盘输入
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            const key = e.key.toUpperCase();
            
            // 只处理字母键
            if (key.length === 1 && key >= 'A' && key <= 'Z') {
                totalCount++;
                
                // 查找最近的匹配字母
                const caughtLetter = letters.find(l => l.isCaught(key));
                
                if (caughtLetter) {
                    caughtLetter.caught = true;
                    score += 10 + combo; // 连击奖励
                    combo++;
                    correctCount++;
                    
                    if (combo > maxCombo) maxCombo = combo;
                    
                    // 显示连击效果
                    if (combo >= 5) {
                        showComboEffect(combo);
                    }
                    
                    updateUI();
                    
                    // 播放接住音效
                    playCatchSound();
                } else {
                    combo = 0;
                    updateUI();
                }
            }
        });
        
        // 显示连击效果
        function showComboEffect(comboCount) {
            const comboDisplay = document.getElementById('combo-display');
            comboDisplay.textContent = `${comboCount} 连击!`;
            comboDisplay.classList.add('show');
            
            setTimeout(() => {
                comboDisplay.classList.remove('show');
            }, 500);
        }
        
        // 更新 UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('combo').textContent = combo;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            const accuracy = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-combo').textContent = maxCombo;
            document.getElementById('final-accuracy').textContent = accuracy + '%';
            document.getElementById('game-over-modal').classList.add('show');
            
            // 保存最高分
            const savedScore = localStorage.getItem('fallingLettersHighScore') || 0;
            if (score > savedScore) {
                localStorage.setItem('fallingLettersHighScore', score);
            }
            
            playGameOverSound();
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('game-over-modal').classList.remove('show');
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('restart-btn').style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            letters = [];
        }
        
        // 音效函数
        function playCatchSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }
        
        function playGameOverSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                [349.23, 311.13, 261.63].forEach((freq, i) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = freq;
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime + i * 0.2);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.2 + 0.3);
                    
                    oscillator.start(audioContext.currentTime + i * 0.2);
                    oscillator.stop(audioContext.currentTime + i * 0.2 + 0.3);
                });
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }
        
        // 初始化
        resizeCanvas();
        console.log('🍎 字母雨游戏已加载');
    </script>
</body>
</html>
